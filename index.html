<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Class Allocation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <div id="app" class="min-h-screen bg-slate-50">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 flex items-center">
                            <i class="fas fa-graduation-cap text-2xl text-indigo-600"></i>
                            <span class="ml-2 text-xl font-bold text-slate-800">SmartClass</span>
                        </div>
                        <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                            <a href="/dashboard.html" class="nav-link inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-slate-500 hover:text-slate-700 hover:border-slate-300">
                                <i class="fas fa-chart-pie mr-2"></i>Dashboard
                            </a>
                            <a href="/students.html" class="nav-link inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-slate-500 hover:text-slate-700 hover:border-slate-300">
                                <i class="fas fa-users mr-2"></i>Students
                            </a>
                            <a href="/upload.html" class="nav-link inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-slate-500 hover:text-slate-700 hover:border-slate-300">
                                <i class="fas fa-upload mr-2"></i>Upload
                            </a>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="userDisplay" class="text-sm text-slate-600"></span>
                        <button id="logoutBtn" class="text-sm text-slate-500 hover:text-slate-700">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="pageContent">
                <!-- Page content will be rendered here -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-slate-200 mt-auto">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <p class="text-center text-sm text-slate-500">
                    &copy; 2024 Smart Class Allocation. All rights reserved.
                </p>
            </div>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>

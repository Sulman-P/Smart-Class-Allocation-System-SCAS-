# .streamlit/config.toml

[theme]
base = "light"
primaryColor = "#D4A017"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8F9FA"
textColor = "#0A1A3A"
font = "sans serif"

[server]
# Production server settings
runOnSave = false
enableXsrfProtection = true
enableCORS = false
enableWebsocketCompression = true
maxUploadSize = 200
maxMessageSize = 200
port = 8501
headless = true

[browser]
gatherUsageStats = false
serverAddress = "kenyavault.co.ke"
serverPort = 8501

[logger]
level = "error"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[runner]
fastReruns = false

[global]
developmentMode = false

[mapbox]
token = ""

[deprecation]
showfileUploaderEncoding = false
showImageFormats = false

[ui]
hideTopBar = true

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Smart Class Allocation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="bg-slate-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <i class="fas fa-graduation-cap text-2xl text-indigo-600"></i>
                        <span class="ml-2 text-xl font-bold text-slate-800">SmartClass</span>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/dashboard.html" class="nav-link active inline-flex items-center px-1 pt-1 border-b-2 border-indigo-500 text-sm font-medium text-slate-900">
                            <i class="fas fa-chart-pie mr-2"></i>Dashboard
                        </a>
                        <a href="/students.html" class="nav-link inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-slate-500 hover:text-slate-700 hover:border-slate-300">
                            <i class="fas fa-users mr-2"></i>Students
                        </a>
                        <a href="/upload.html" class="nav-link inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-slate-500 hover:text-slate-700 hover:border-slate-300">
                            <i class="fas fa-upload mr-2"></i>Upload
                        </a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userDisplay" class="text-sm text-slate-600"></span>
                    <button id="logoutBtn" class="text-sm text-slate-500 hover:text-slate-700">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Grid -->
        <div id="statsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- Stat cards will be rendered by JS -->
        </div>

        <!-- Charts and Activity -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-lg font-semibold text-slate-800 mb-4">
                    <i class="fas fa-chart-bar text-indigo-600 mr-2"></i>
                    Student Distribution
                </h3>
                <div id="distributionChart" class="h-64 flex items-center justify-center">
                    <div class="flex space-x-8 items-end h-48">
                        <div class="flex flex-col items-center space-y-2">
                            <div id="maleBar" class="w-12 bg-indigo-500 rounded-t transition-all duration-500" style="height: 0px;"></div>
                            <span class="text-sm font-medium text-slate-600">Male</span>
                            <span id="maleCount" class="text-sm text-slate-500">0</span>
                        </div>
                        <div class="flex flex-col items-center space-y-2">
                            <div id="femaleBar" class="w-12 bg-pink-500 rounded-t transition-all duration-500" style="height: 0px;"></div>
                            <span class="text-sm font-medium text-slate-600">Female</span>
                            <span id="femaleCount" class="text-sm text-slate-500">0</span>
                        </div>
                        <div class="flex flex-col items-center space-y-2">
                            <div id="boarderBar" class="w-12 bg-cyan-500 rounded-t transition-all duration-500" style="height: 0px;"></div>
                            <span class="text-sm font-medium text-slate-600">Boarders</span>
                            <span id="boarderCount" class="text-sm text-slate-500">0</span>
                        </div>
                        <div class="flex flex-col items-center space-y-2">
                            <div id="dayBar" class="w-12 bg-amber-500 rounded-t transition-all duration-500" style="height: 0px;"></div>
                            <span class="text-sm font-medium text-slate-600">Day</span>
                            <span id="dayCount" class="text-sm text-slate-500">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-lg font-semibold text-slate-800 mb-4">
                    <i class="fas fa-clock text-indigo-600 mr-2"></i>
                    Recent Activity
                </h3>
                <div id="recentActivity" class="space-y-4">
                    <p class="text-sm text-slate-500 text-center py-8">Loading activity...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
